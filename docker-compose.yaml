version: '3'

services:
  nginx:
    image: nginx:1.25.4-alpine
    volumes:
      - .:/var/www
      - ./docker/nginx/templates:/etc/nginx/templates
    ports:
      - "8080:80"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    depends_on:
      - php-fpm
    restart: on-failure

  php-fpm:
    build:
      context: ./docker/php
    env_file:
      - /src/.env
    volumes:
      - .:/var/www
    depends_on:
      - postgres
    restart: on-failure

  postgres:
    image: postgres:16-alpine
    env_file:
      - /src/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: on-failure

volumes:
  postgres_data:
